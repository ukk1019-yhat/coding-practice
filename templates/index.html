<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Practice</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h2>Problems (186)</h2>
    <input id="search" type="text" placeholder="Search problems..." oninput="filterProblems(this.value)">
    <ul id="problem-list"></ul>
  </aside>
  <main id="main">
    <div id="welcome">
      <h1>Coding Practice</h1>
      <p>Select a problem from the sidebar to get started.</p>
    </div>
    <div id="problem-view" style="display:none">
      <div id="problem-header">
        <h2 id="problem-title"></h2>
        <span id="problem-difficulty" class="badge"></span>
      </div>
      <div id="problem-description"></div>
      <div id="editor-section">
        <textarea id="code-editor" spellcheck="false"></textarea>
        <div id="editor-actions">
          <div id="mode-tabs">
            <button class="mode-btn active" data-mode="test" onclick="switchMode('test')">Run Tests</button>
            <button class="mode-btn" data-mode="custom" onclick="switchMode('custom')">Run Custom</button>
          </div>
          <div id="custom-input-area" style="display:none">
            <textarea id="custom-input" placeholder="Paste your test code here&#10;Example: print(two_sum([2,7,11,15], 9))" spellcheck="false"></textarea>
          </div>
          <button id="btn-run" onclick="runCode()">Run Tests</button>
        </div>
      </div>
      <div id="results" style="display:none">
        <h3>Results</h3>
        <div id="results-summary"></div>
        <div id="results-detail"></div>
      </div>
    </div>
  </main>
</div>
<script>
let currentProblemId = null;
let currentMode = 'test';

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('custom-input-area').style.display = mode === 'custom' ? 'block' : 'none';
  document.getElementById('btn-run').textContent = mode === 'test' ? 'Run Tests' : 'Run Code';
}

async function loadProblems() {
  const res = await fetch('/api/problems');
  const problems = await res.json();
  window.allProblems = problems;
  renderProblems(problems);
}

function renderProblems(problems) {
  const list = document.getElementById('problem-list');
  list.innerHTML = problems.map(p =>
    `<li class="${p.difficulty}" onclick="loadProblem('${p.id}')">${escapeHtml(p.title)} <span class="diff-${p.difficulty}">${p.difficulty}</span></li>`
  ).join('');
}

function filterProblems(q) {
  if (!window.allProblems) return;
  const filtered = window.allProblems.filter(p =>
    p.title.toLowerCase().includes(q.toLowerCase()) || p.id.includes(q.toLowerCase())
  );
  renderProblems(filtered);
}

async function loadProblem(id) {
  currentProblemId = id;
  const res = await fetch(`/api/problems/${id}`);
  const p = await res.json();
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('problem-view').style.display = 'block';
  document.getElementById('problem-title').textContent = p.title;
  document.getElementById('problem-difficulty').textContent = p.difficulty;
  document.getElementById('problem-difficulty').className = 'badge ' + p.difficulty;
  document.getElementById('problem-description').innerHTML = marked(p.description);
  document.getElementById('code-editor').value = p.starter_code;
  document.getElementById('custom-input').value =
    `# Example: run your function with test input\nprint(${p.function_name}())`;
  document.getElementById('results').style.display = 'none';
  document.querySelectorAll('#problem-list li').forEach(el => el.classList.remove('active'));
  const match = document.querySelector(`#problem-list li[onclick*="${id}"]`);
  if (match) match.classList.add('active');
}

function marked(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('```')) return '<pre><code>' + escapeHtml(line.slice(3)) + '</code></pre>';
    return '<p>' + escapeHtml(line) + '</p>';
  }).join('');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function runCode() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.textContent = 'Running...';
  document.getElementById('results').style.display = 'none';

  if (currentMode === 'test') {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        problem_id: currentProblemId,
        code: document.getElementById('code-editor').value
      })
    });
    const data = await res.json();
    btn.disabled = false;
    btn.textContent = 'Run Tests';
    showTestResults(data);
  } else {
    const customCode = document.getElementById('custom-input').value;
    const userCode = document.getElementById('code-editor').value;
    const fullCode = userCode + '\n' + customCode;
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code: fullCode})
    });
    const data = await res.json();
    btn.disabled = false;
    btn.textContent = 'Run Code';
    showRunResults(data);
  }
}

function showTestResults(data) {
  const el = document.getElementById('results');
  el.style.display = 'block';
  document.getElementById('results-summary').innerHTML = '';
  document.getElementById('results-detail').innerHTML = '';

  if (data.error) {
    document.getElementById('results-summary').innerHTML = `<div class="error"><strong>Error:</strong>\n${escapeHtml(data.error)}</div>`;
    return;
  }
  if (!data.results || data.results.length === 0) {
    document.getElementById('results-summary').innerHTML = `<div class="info">No test cases defined for this problem. Switch to "Run Custom" mode to test manually.</div>`;
    return;
  }

  const passed = data.results.filter(r => r.passed).length;
  const total = data.results.length;
  document.getElementById('results-summary').innerHTML =
    `<div class="${data.all_passed ? 'pass' : 'fail'}">
      <strong>${passed}/${total} tests passed</strong>
      ${data.all_passed ? ' ✓ All passed!' : ' ✗ Some failed'}
    </div>`;

  document.getElementById('results-detail').innerHTML += data.results.map((r, i) =>
    `<div class="test-case ${r.passed ? 'pass' : 'fail'}">
      <strong>Test ${i+1}:</strong> ${r.passed ? '✓ PASS' : '✗ FAIL'}
      <br>Input: <code>${escapeHtml(JSON.stringify(r.input))}</code>
      <br>Expected: <code>${escapeHtml(JSON.stringify(r.expected))}</code>
      <br>Actual: <code>${escapeHtml(JSON.stringify(r.actual))}</code>
      ${r.time_ms !== null ? `<br>⏱ ${r.time_ms}ms` : ''}
    </div>`
  ).join('');

  if (data.stdout) {
    document.getElementById('results-detail').innerHTML +=
      `<div class="stdout"><strong>stdout:</strong><pre>${escapeHtml(data.stdout)}</pre></div>`;
  }
}

function showRunResults(data) {
  const el = document.getElementById('results');
  el.style.display = 'block';
  document.getElementById('results-summary').innerHTML = '';
  document.getElementById('results-detail').innerHTML = '';

  if (data.error) {
    document.getElementById('results-summary').innerHTML = `<div class="error"><strong>Error:</strong>\n${escapeHtml(data.error)}</div>`;
    return;
  }

  document.getElementById('results-summary').innerHTML = `<div class="pass"><strong>Execution completed</strong></div>`;
  document.getElementById('results-detail').innerHTML =
    `<div class="stdout"><strong>Output:</strong><pre>${escapeHtml(data.stdout || '(no output)')}</pre></div>`;
}

loadProblems();
</script>
</body>
</html>
